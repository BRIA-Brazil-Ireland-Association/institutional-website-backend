services:
  postgres:
    image: postgres:16-alpine
    container_name: bria-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bria
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bria-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: institutional-website-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bria
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bria-network
    restart: unless-stopped

  frontend:
    build:
      context: ../bria-frontend
      dockerfile: Dockerfile
    container_name: bria-frontend
    env_file:
      - ../bria-frontend/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_CMS_URL: http://backend:3001/cms/api
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bria-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bria-network:
    driver: bridge
